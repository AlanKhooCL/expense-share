<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trip Planner</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .day-map {
            height: 300px;
            width: 100%;
            border-radius: 1rem;
            z-index: 1;
        }

        .expense-input {
            width: 90px;
            padding: 2px 6px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.8rem;
            text-align: right;
            transition: border-color 0.2s;
            background: #f8fafc;
        }
        .expense-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15);
            background: #fff;
        }

        .budget-bar-fill { transition: width 0.5s ease; }
        .map-toggle-btn { cursor: pointer; transition: all 0.2s; }
        .map-toggle-btn:hover { transform: scale(1.05); }

        .map-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.4s ease;
        }
        .map-container.open {
            max-height: 400px;
            padding-top: 12px;
            padding-bottom: 12px;
        }

        /* Loading Spinner */
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-800">

    <!-- Navbar -->
    <nav class="bg-slate-900 text-white shadow-md sticky top-0 z-20">
        <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="showDashboard()">
                <i data-lucide="plane" class="text-blue-400"></i>
                <span class="font-bold text-lg tracking-tight">AI Trip Planner</span>
            </div>
            <button onclick="showDashboard()" class="text-sm font-medium hover:text-blue-400 transition-colors">My Trips</button>
        </div>
    </nav>

    <!-- App Container -->
    <div id="app-container">
        <!-- Dashboard & Trip Content will be injected here -->
    </div>

    <!-- AI Generation Modal -->
    <div id="ai-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl shadow-2xl max-w-lg w-full overflow-hidden transform scale-95 transition-transform duration-300" id="ai-modal-content">
            <div class="p-6 sm:p-8">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-bold text-slate-900 flex items-center gap-2">
                        <i data-lucide="sparkles" class="text-amber-500"></i> Plan with AI
                    </h2>
                    <button onclick="closeAIModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Destination</label>
                        <input type="text" id="ai-dest" placeholder="e.g., Hokkaido, Japan" class="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Start Date</label>
                            <input type="date" id="ai-start" class="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">End Date</label>
                            <input type="date" id="ai-end" class="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Preferences & Budget</label>
                        <textarea id="ai-prefs" rows="3" placeholder="e.g., Moderate budget, focus on food and nature, minimal hiking, budget around $2000 SGD." class="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
                    </div>
                </div>

                <div class="mt-8 flex justify-end gap-3">
                    <button onclick="closeAIModal()" class="px-5 py-2.5 rounded-xl font-bold text-slate-600 hover:bg-slate-100 transition-colors">Cancel</button>
                    <button onclick="generateTrip()" class="px-5 py-2.5 rounded-xl font-bold bg-blue-600 text-white hover:bg-blue-700 transition-colors shadow-md flex items-center gap-2">
                        <i data-lucide="wand-2" class="w-4 h-4"></i> Generate Itinerary
                    </button>
                </div>
            </div>
            
            <!-- Loading Overlay inside Modal -->
            <div id="ai-loading" class="absolute inset-0 bg-blue-600 flex flex-col items-center justify-center text-white hidden">
                <div class="spinner mb-4"></div>
                <h3 class="text-xl font-bold mb-2">AI is researching...</h3>
                <p class="text-blue-200 text-sm text-center px-8" id="loading-msg">Finding the best spots, calculating budgets, and mapping coordinates.</p>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        // IMPORTANT: Leave apiKey as an empty string to automatically use the environment's built-in key. 
        // If you populate this with an invalid key, the API will return a 401 error.
        const apiKey = "AIzaSyAM3HR3mD1UCk73cB-_A_BoPZUo6krDcfg";

        // Static classes mapping for Tailwind
        const themeStyles = {
            pink: { btnActive: "bg-pink-500 text-white shadow-md", iconActive: "text-white", iconInactive: "text-pink-500", badge: "bg-pink-100 text-pink-700 border-pink-200", headerGrad: "from-pink-50", textMain: "text-pink-600", timelineIconNode: "border-pink-400 text-pink-500", mapMarker: "#ec4899" },
            orange: { btnActive: "bg-orange-500 text-white shadow-md", iconActive: "text-white", iconInactive: "text-orange-500", badge: "bg-orange-100 text-orange-700 border-orange-200", headerGrad: "from-orange-50", textMain: "text-orange-600", timelineIconNode: "border-orange-400 text-orange-500", mapMarker: "#f97316" },
            purple: { btnActive: "bg-purple-500 text-white shadow-md", iconActive: "text-white", iconInactive: "text-purple-500", badge: "bg-purple-100 text-purple-700 border-purple-200", headerGrad: "from-purple-50", textMain: "text-purple-600", timelineIconNode: "border-purple-400 text-purple-500", mapMarker: "#a855f7" },
            blue: { btnActive: "bg-blue-500 text-white shadow-md", iconActive: "text-white", iconInactive: "text-blue-500", badge: "bg-blue-100 text-blue-700 border-blue-200", headerGrad: "from-blue-50", textMain: "text-blue-600", timelineIconNode: "border-blue-400 text-blue-500", mapMarker: "#3b82f6" },
            green: { btnActive: "bg-green-500 text-white shadow-md", iconActive: "text-white", iconInactive: "text-green-500", badge: "bg-green-100 text-green-700 border-green-200", headerGrad: "from-green-50", textMain: "text-green-600", timelineIconNode: "border-green-400 text-green-500", mapMarker: "#22c55e" }
        };

        // --- DATA & STATE MANAGEMENT ---
        let trips = [];
        let activeTripId = null;
        let activeFilter = 'all';
        let openMaps = new Set();
        let mapInstances = {};

        function loadData() {
            const saved = localStorage.getItem('ai_travel_trips');
            if (saved) {
                try { trips = JSON.parse(saved); } catch(e) { trips = []; }
            }
            showDashboard();
        }

        function saveData() {
            localStorage.setItem('ai_travel_trips', JSON.stringify(trips));
        }

        // --- NAVIGATION ---
        function showDashboard() {
            activeTripId = null;
            const container = document.getElementById('app-container');
            
            let html = `
                <main class="max-w-5xl mx-auto px-4 py-12">
                    <div class="flex items-center justify-between mb-8">
                        <div>
                            <h1 class="text-3xl font-extrabold text-slate-900">My Trips</h1>
                            <p class="text-slate-500 mt-1">Manage and plan your upcoming adventures.</p>
                        </div>
                        <button onclick="openAIModal()" class="bg-slate-900 text-white px-5 py-2.5 rounded-xl font-bold shadow-md hover:bg-slate-800 transition-colors flex items-center gap-2">
                            <i data-lucide="plus" class="w-5 h-5"></i> New Trip
                        </button>
                    </div>
                    
                    ${trips.length === 0 ? `
                        <div class="bg-white border-2 border-dashed border-slate-300 rounded-3xl p-12 text-center">
                            <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-400">
                                <i data-lucide="map" class="w-8 h-8"></i>
                            </div>
                            <h3 class="text-xl font-bold text-slate-700 mb-2">No trips planned yet</h3>
                            <p class="text-slate-500 mb-6">Let AI craft the perfect itinerary for your next vacation.</p>
                            <button onclick="openAIModal()" class="text-blue-600 font-bold hover:underline">Plan your first trip &rarr;</button>
                        </div>
                    ` : `
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${trips.map(trip => `
                                <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm hover:shadow-lg transition-all cursor-pointer group" onclick="openTrip('${trip.id}')">
                                    <div class="h-40 bg-slate-200 relative overflow-hidden">
                                        <img src="${trip.locations && trip.locations[0] ? trip.locations[0].image : 'https://picsum.photos/800/400'}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                                        <div class="absolute inset-0 bg-gradient-to-t from-slate-900/60 to-transparent"></div>
                                        <div class="absolute bottom-4 left-4 right-4">
                                            <h3 class="text-xl font-bold text-white mb-1 line-clamp-1">${trip.overview.title}</h3>
                                            <p class="text-sm text-slate-200">${trip.overview.dates}</p>
                                        </div>
                                    </div>
                                    <div class="p-5 flex justify-between items-center bg-white">
                                        <span class="text-sm font-semibold text-slate-500 flex items-center gap-1"><i data-lucide="map-pin" class="w-4 h-4"></i> ${trip.locations.length} Locations</span>
                                        <button class="text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors" onclick="event.stopPropagation(); deleteTrip('${trip.id}')">
                                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                                        </button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `}
                </main>
            `;
            container.innerHTML = html;
            lucide.createIcons();
        }

        function openTrip(id) {
            activeTripId = id;
            activeFilter = 'all';
            openMaps.clear();
            mapInstances = {};
            renderTripView();
        }

        function deleteTrip(id) {
            if(confirm("Are you sure you want to delete this trip?")) {
                trips = trips.filter(t => t.id !== id);
                saveData();
                showDashboard();
            }
        }

        // --- AI MODAL LOGIC ---
        function openAIModal() {
            const modal = document.getElementById('ai-modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                document.getElementById('ai-modal-content').classList.remove('scale-95');
            }, 10);
        }

        function closeAIModal() {
            const modal = document.getElementById('ai-modal');
            modal.classList.add('opacity-0');
            document.getElementById('ai-modal-content').classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
            document.getElementById('ai-loading').classList.add('hidden');
        }

        const msgs = ["Consulting local guides...", "Mapping out coordinates...", "Estimating budgets...", "Finding the best coffee..."];
        let msgInterval;

        async function generateTrip() {
            const dest = document.getElementById('ai-dest').value;
            const start = document.getElementById('ai-start').value;
            const end = document.getElementById('ai-end').value;
            const prefs = document.getElementById('ai-prefs').value;

            if(!dest || !start || !end) {
                alert("Please fill in destination and dates.");
                return;
            }

            // UI Loading state
            document.getElementById('ai-loading').classList.remove('hidden');
            let mIdx = 0;
            msgInterval = setInterval(() => {
                document.getElementById('loading-msg').innerText = msgs[mIdx % msgs.length];
                mIdx++;
            }, 2500);

            const systemPrompt = `You are an expert travel planner. Create a highly detailed travel itinerary. Respond ONLY with a raw JSON object matching exactly the requested structure. Generate at least 3 days of events, and assign a realistic 'expense' cost (in SGD) to relevant events. Provide REAL latitude/longitude for 'latlng' arrays.`;
            const userQuery = `
Destination: ${dest}
Start Date: ${start}
End Date: ${end}
User Preferences: ${prefs}

Required JSON Structure:
{
    "id": "${Date.now().toString()}",
    "overview": {
        "title": "A catchy title for ${dest}",
        "dates": "${start} to ${end}",
        "totalBudget": "Base flights/accomm estimate"
    },
    "budget": [
        { "item": "Flights", "cost": "$...", "amount": 1000, "icon": "plane-takeoff" },
        { "item": "Hotel", "cost": "$...", "amount": 800, "icon": "bed-double" }
    ],
    "locations": [
        { "id": "loc1", "name": "Primary City Name", "color": "pink", "image": "https://picsum.photos/seed/${dest.replace(/\s/g, '')}1/1000/600" }
    ],
    "itinerary": [
        {
            "day": 1, 
            "date": "Day 1 Date", 
            "location": "loc1", 
            "title": "Arrival & Exploration",
            "events": [
                { "time": "10:00 AM", "desc": "Event description <span class='block text-sm font-normal text-slate-500 mt-1'>Helpful tip</span>", "icon": "map-pin", "expense": 15, "latlng": [1.3521, 103.8198] }
            ]
        }
    ]
}
Make sure 'color' in locations is one of: pink, orange, purple, blue, green.
Make sure 'icon' is a valid standard lucide icon name.
`;

            try {
                const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userQuery }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { 
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    id: { type: "STRING" },
                                    overview: {
                                        type: "OBJECT",
                                        properties: {
                                            title: { type: "STRING" },
                                            dates: { type: "STRING" },
                                            totalBudget: { type: "STRING" }
                                        }
                                    },
                                    budget: {
                                        type: "ARRAY",
                                        items: {
                                            type: "OBJECT",
                                            properties: {
                                                item: { type: "STRING" },
                                                cost: { type: "STRING" },
                                                amount: { type: "INTEGER" },
                                                icon: { type: "STRING" }
                                            }
                                        }
                                    },
                                    locations: {
                                        type: "ARRAY",
                                        items: {
                                            type: "OBJECT",
                                            properties: {
                                                id: { type: "STRING" },
                                                name: { type: "STRING" },
                                                color: { type: "STRING" },
                                                image: { type: "STRING" }
                                            }
                                        }
                                    },
                                    itinerary: {
                                        type: "ARRAY",
                                        items: {
                                            type: "OBJECT",
                                            properties: {
                                                day: { type: "INTEGER" },
                                                date: { type: "STRING" },
                                                location: { type: "STRING" },
                                                title: { type: "STRING" },
                                                events: {
                                                    type: "ARRAY",
                                                    items: {
                                                        type: "OBJECT",
                                                        properties: {
                                                            time: { type: "STRING" },
                                                            desc: { type: "STRING" },
                                                            icon: { type: "STRING" },
                                                            expense: { type: "INTEGER" },
                                                            latlng: {
                                                                type: "ARRAY",
                                                                items: { type: "NUMBER" }
                                                            },
                                                            link: { type: "STRING" }
                                                        }
                                                    }
                                                }
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    })
                });

                const data = await response.json();
                const jsonText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if(!jsonText) throw new Error("No response from AI");

                // Parse the response
                const newTrip = JSON.parse(jsonText);
                trips.unshift(newTrip); // Add to beginning
                saveData();
                
                clearInterval(msgInterval);
                closeAIModal();
                openTrip(newTrip.id);

            } catch (error) {
                console.error(error);
                clearInterval(msgInterval);
                alert(error.message || "Failed to generate trip. Please try again.");
                document.getElementById('ai-loading').classList.add('hidden');
            }
        }

        // Retry logic for API calls with Exponential Backoff
        async function fetchWithRetry(url, options) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < delays.length; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        // Throw a specific error for 401/403 so it stops retrying and alerts the user immediately
                        if (response.status === 401 || response.status === 403) {
                            throw new Error(`Authentication Error (${response.status}): If you provided a custom API key, it is likely invalid. To use the built-in key, please ensure 'const apiKey = "";' is kept entirely empty.`);
                        }
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response;
                } catch (e) {
                    // Do not retry on auth errors
                    if (e.message.includes("Authentication Error") || i === delays.length - 1) {
                        throw e;
                    }
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        // --- TRIP VIEW RENDER LOGIC ---
        function renderTripView() {
            const trip = trips.find(t => t.id === activeTripId);
            if(!trip) return showDashboard();

            const container = document.getElementById('app-container');
            
            let html = `
                <header class="bg-white border-b border-slate-200 sticky top-[60px] z-10 shadow-sm">
                    <div class="max-w-5xl mx-auto px-4 py-6">
                        <div class="flex items-center justify-between mb-2">
                            <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">${trip.overview.title}</h1>
                        </div>
                        <div class="flex flex-wrap items-center gap-4 text-sm text-slate-500 font-medium" id="header-meta">
                            <!-- Injected by renderHeaderMeta -->
                        </div>
                        <div class="flex overflow-x-auto gap-2 mt-6 pb-2 no-scrollbar" id="filter-nav">
                            <!-- Filters -->
                        </div>
                    </div>
                </header>
                <main class="max-w-5xl mx-auto px-4 py-8" id="main-content">
                    <!-- Dynamic content -->
                </main>
            `;
            container.innerHTML = html;
            
            updateTripContent();
        }

        function updateTripContent() {
            const trip = trips.find(t => t.id === activeTripId);
            renderFilters(trip);
            
            let mainHtml = '';
            if (activeFilter === 'all') {
                mainHtml += renderBudget(trip);
            } else {
                mainHtml += renderHero(trip);
            }

            mainHtml += renderExpenseSummary(trip);
            mainHtml += renderTimeline(trip);

            document.getElementById('main-content').innerHTML = mainHtml;
            renderHeaderMeta(trip);
            lucide.createIcons();
        }

        function setFilter(filterId) {
            activeFilter = filterId;
            Object.values(mapInstances).forEach(m => m.remove());
            mapInstances = {};
            openMaps.clear();
            updateTripContent();
        }

        // Calculation helpers relative to active trip
        function getTotalActivityExpenses(trip) {
            return trip.itinerary.reduce((sum, day) => sum + day.events.reduce((s, e) => s + (e.expense || 0), 0), 0);
        }
        function getDayExpenses(trip, dayNum) {
            const day = trip.itinerary.find(d => d.day === dayNum);
            return day ? day.events.reduce((sum, e) => sum + (e.expense || 0), 0) : 0;
        }
        function getLocationExpenses(trip, locId) {
            return trip.itinerary.filter(d => d.location === locId)
                .reduce((sum, day) => sum + day.events.reduce((s, e) => s + (e.expense || 0), 0), 0);
        }
        function getBaseBudgetTotal(trip) {
            return trip.budget.reduce((sum, b) => sum + (Number(b.amount) || 0), 0);
        }

        function renderHeaderMeta(trip) {
            const activityTotal = getTotalActivityExpenses(trip);
            const baseTotal = getBaseBudgetTotal(trip);
            const grandTotal = baseTotal + activityTotal;
            document.getElementById('header-meta').innerHTML = `
                <span class="flex items-center gap-1.5"><i data-lucide="calendar" class="w-4 h-4"></i> ${trip.overview.dates}</span>
                <span class="flex items-center gap-1.5"><i data-lucide="credit-card" class="w-4 h-4"></i> Base: $${baseTotal.toLocaleString()}</span>
                <span class="flex items-center gap-1.5"><i data-lucide="wallet" class="w-4 h-4"></i> Activities: $${activityTotal.toLocaleString()}</span>
                <span class="flex items-center gap-1.5 font-bold text-slate-700"><i data-lucide="calculator" class="w-4 h-4"></i> Total: $${grandTotal.toLocaleString()}</span>
            `;
            lucide.createIcons({ attrs: { class: ['w-4', 'h-4'] } });
        }

        function renderFilters(trip) {
            const navContainer = document.getElementById('filter-nav');
            let html = `
                <button onclick="setFilter('all')" class="px-4 py-2 rounded-full text-sm font-bold transition-colors whitespace-nowrap ${
                    activeFilter === 'all' ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
                }">Full Itinerary</button>
            `;

            trip.locations.forEach(loc => {
                const isActive = activeFilter === loc.id;
                const theme = themeStyles[loc.color] || themeStyles.blue;
                const btnClass = isActive ? theme.btnActive : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50';
                const iconClass = isActive ? theme.iconActive : theme.iconInactive;

                html += `
                    <button onclick="setFilter('${loc.id}')" class="px-4 py-2 rounded-full text-sm font-bold transition-colors whitespace-nowrap flex items-center gap-2 ${btnClass}">
                        <i data-lucide="map-pin" class="w-4 h-4 ${iconClass}"></i> ${loc.name}
                    </button>
                `;
            });
            navContainer.innerHTML = html;
        }

        function renderBudget(trip) {
            let html = `
                <section class="mb-8">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i data-lucide="credit-card" class="text-slate-400 w-6 h-6"></i> Base Estimates</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            `;
            trip.budget.forEach(item => {
                html += `
                    <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex items-start gap-4 hover:shadow-md transition-shadow">
                        <div class="bg-slate-100 p-2.5 rounded-xl text-slate-600">
                            <i data-lucide="${item.icon || 'circle-dollar-word'}" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <p class="text-xs text-slate-500 font-medium mb-1">${item.item}</p>
                            <p class="font-bold text-slate-900">${item.cost}</p>
                        </div>
                    </div>
                `;
            });
            html += `</div></section>`;
            return html;
        }

        function renderHero(trip) {
            const activeLocation = trip.locations.find(l => l.id === activeFilter);
            if (!activeLocation) return '';
            return `
                <div class="w-full h-64 md:h-80 rounded-3xl overflow-hidden mb-8 relative shadow-lg">
                    <img src="${activeLocation.image}" alt="${activeLocation.name}" class="w-full h-full object-cover" />
                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end p-8">
                        <h2 class="text-4xl font-extrabold text-white">${activeLocation.name}</h2>
                    </div>
                </div>
            `;
        }

        function renderExpenseSummary(trip) {
            const baseTotal = getBaseBudgetTotal(trip);
            const activityTotal = getTotalActivityExpenses(trip);
            const grandTotal = baseTotal + activityTotal;

            const filteredLocations = activeFilter === 'all' ? trip.locations : trip.locations.filter(l => l.id === activeFilter);
            let locBreakdown = '';
            
            filteredLocations.forEach(loc => {
                const locExp = getLocationExpenses(trip, loc.id);
                const theme = themeStyles[loc.color] || themeStyles.blue;
                locBreakdown += `
                    <div class="flex items-center justify-between py-1.5">
                        <span class="text-sm font-medium ${theme.textMain} flex items-center gap-1.5"><i data-lucide="map-pin" class="w-3.5 h-3.5"></i> ${loc.name}</span>
                        <span class="text-sm font-bold text-slate-700">$${locExp.toLocaleString()}</span>
                    </div>
                `;
            });

            const filteredActivityTotal = activeFilter === 'all' ? activityTotal : getLocationExpenses(trip, activeFilter);

            return `
                <section class="mb-8">
                    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="text-lg font-bold flex items-center gap-2"><i data-lucide="wallet" class="text-blue-500 w-5 h-5"></i> Tracker</h3>
                            <div class="text-right">
                                <p class="text-xs text-slate-400">Estimated Activity Spend</p>
                                <p class="text-2xl font-extrabold text-slate-900">$${filteredActivityTotal.toLocaleString()}</p>
                            </div>
                        </div>
                        <div class="w-full bg-slate-100 rounded-full h-3 mb-4 overflow-hidden">
                            <div class="budget-bar-fill h-full rounded-full bg-gradient-to-r from-blue-400 to-blue-600" style="width: ${Math.min((activityTotal / (grandTotal || 1)) * 100, 100)}%"></div>
                        </div>
                        <div class="border-t border-slate-100 pt-3">${locBreakdown}</div>
                        ${activeFilter === 'all' ? `
                        <div class="border-t border-slate-200 mt-3 pt-3 flex items-center justify-between">
                            <span class="text-sm font-bold text-slate-800">Grand Total</span>
                            <span class="text-lg font-extrabold text-slate-900">$${grandTotal.toLocaleString()}</span>
                        </div>` : ''}
                    </div>
                </section>
            `;
        }

        function renderTimeline(trip) {
            const filteredItinerary = trip.itinerary.filter(day => activeFilter === 'all' || day.location === activeFilter);
            if (filteredItinerary.length === 0) return `<div class="text-center py-20"><p class="text-slate-500">No events found.</p></div>`;

            let html = '<div class="space-y-8">';
            filteredItinerary.forEach(day => {
                const locInfo = trip.locations.find(l => l.id === day.location) || { color: 'blue', name: 'Unknown' };
                const theme = themeStyles[locInfo.color] || themeStyles.blue;
                const dayExpense = getDayExpenses(trip, day.day);
                const hasMapPins = day.events.some(e => e.latlng && e.latlng.length === 2);

                html += `
                    <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden hover:shadow-md transition-shadow">
                        <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-gradient-to-r ${theme.headerGrad} to-white">
                            <div>
                                <p class="text-sm font-bold ${theme.textMain} mb-1 flex items-center gap-2">DAY ${day.day} <span class="text-slate-300">•</span> ${day.date}</p>
                                <h3 class="text-xl font-extrabold text-slate-900">${day.title}</h3>
                            </div>
                            <div class="flex flex-wrap justify-end items-center gap-2 sm:gap-3">
                                <span class="text-sm font-bold text-slate-600 bg-slate-100 px-3 py-1 rounded-full flex items-center gap-1.5" data-day-expense="${day.day}">
                                    <i data-lucide="wallet" class="w-3.5 h-3.5"></i> $${dayExpense}
                                </span>
                                ${hasMapPins ? `
                                <button onclick="toggleMap(${day.day})" class="map-toggle-btn px-3 py-1 rounded-full text-xs font-semibold border ${theme.badge} flex items-center gap-1.5">
                                    <i data-lucide="map" class="w-3.5 h-3.5"></i> Map
                                </button>
                                ` : ''}
                                <span class="hidden sm:inline-flex px-3 py-1 rounded-full text-xs font-semibold border ${theme.badge}">${locInfo.name}</span>
                            </div>
                        </div>

                        ${hasMapPins ? `
                        <div id="map-container-${day.day}" class="map-container px-6">
                            <div id="map-${day.day}" class="day-map"></div>
                        </div>
                        ` : ''}

                        <div class="p-6">
                            <div class="relative border-l-2 border-slate-100 ml-3 space-y-8">
                `;

                day.events.forEach((event, eventIdx) => {
                    html += `
                        <div class="relative pl-8">
                            <div class="absolute -left-[17px] top-1 bg-white border-2 w-8 h-8 rounded-full flex items-center justify-center shadow-sm ${theme.timelineIconNode}">
                                <i data-lucide="${event.icon || 'circle'}" class="w-3.5 h-3.5"></i>
                            </div>
                            <div class="flex flex-col sm:flex-row sm:items-start gap-2 sm:gap-4">
                                <span class="text-sm font-bold text-slate-400 min-w-[80px] flex items-center gap-1.5 mt-1">
                                    <i data-lucide="clock" class="w-3.5 h-3.5"></i> ${event.time}
                                </span>
                                <div class="flex flex-col flex-1">
                                    <div class="flex items-start justify-between gap-2">
                                        <div class="flex flex-col">
                                            ${event.link 
                                                ? `<a href="${event.link}" target="_blank" class="text-slate-800 font-medium text-lg leading-tight hover:text-blue-600 transition-colors block">${event.desc}</a>`
                                                : `<span class="text-slate-800 font-medium text-lg leading-tight block">${event.desc}</span>`
                                            }
                                        </div>
                                        <div class="flex items-center gap-1 shrink-0 mt-0.5">
                                            <span class="text-xs text-slate-400">$</span>
                                            <input type="number" min="0" step="1" class="expense-input" value="${event.expense || 0}" 
                                                onchange="updateExpense('${trip.id}', ${day.day}, ${eventIdx}, this.value)" onfocus="this.select()" placeholder="0" />
                                        </div>
                                    </div>
                                    ${event.subLinks ? `<div class="flex flex-col gap-1.5 mt-2">
                                        ${event.subLinks.map(sub => `
                                            <a href="${sub.link}" target="_blank" class="text-sm font-medium text-slate-500 hover:text-blue-600 flex items-center gap-1.5">
                                                <i data-lucide="corner-down-right" class="w-3.5 h-3.5"></i> ${sub.name}
                                            </a>
                                        `).join('')}
                                    </div>` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                });

                html += `</div></div></div>`;
            });

            html += '</div>';
            return html;
        }

        // --- EXPENSE UPDATE ---
        function updateExpense(tripId, dayNum, eventIdx, value) {
            const trip = trips.find(t => t.id === tripId);
            if (!trip) return;
            const day = trip.itinerary.find(d => d.day === dayNum);
            if (day && day.events[eventIdx] !== undefined) {
                day.events[eventIdx].expense = Math.max(0, parseInt(value) || 0);
                saveData();
                renderHeaderMeta(trip);
                updateExpenseDisplays(trip);
            }
        }

        function updateExpenseDisplays(trip) {
            trip.itinerary.forEach(day => {
                const dayExpense = getDayExpenses(trip, day.day);
                const badge = document.querySelector(`[data-day-expense="${day.day}"]`);
                if (badge) badge.innerHTML = `<i data-lucide="wallet" class="w-3.5 h-3.5"></i> $${dayExpense}`;
            });
            const wasOpenMaps = new Set(openMaps);
            updateTripContent();
            wasOpenMaps.forEach(dayNum => setTimeout(() => toggleMap(dayNum), 100));
        }

        // --- MAP LOGIC ---
        function toggleMap(dayNum) {
            const container = document.getElementById(`map-container-${dayNum}`);
            if (!container) return;

            if (openMaps.has(dayNum)) {
                container.classList.remove('open');
                openMaps.delete(dayNum);
                if (mapInstances[dayNum]) {
                    mapInstances[dayNum].remove();
                    delete mapInstances[dayNum];
                }
            } else {
                container.classList.add('open');
                openMaps.add(dayNum);
                setTimeout(() => initMap(dayNum), 50);
            }
        }

        function initMap(dayNum) {
            const mapEl = document.getElementById(`map-${dayNum}`);
            if (!mapEl || mapInstances[dayNum]) return;

            const trip = trips.find(t => t.id === activeTripId);
            const day = trip.itinerary.find(d => d.day === dayNum);
            if (!day) return;

            const locInfo = trip.locations.find(l => l.id === day.location) || { color: 'blue' };
            const theme = themeStyles[locInfo.color] || themeStyles.blue;
            const markerColor = theme.mapMarker;

            const eventsWithCoords = day.events.filter(e => e.latlng && e.latlng.length === 2);
            if (eventsWithCoords.length === 0) return;

            const map = L.map(mapEl, { scrollWheelZoom: false, attributionControl: true });
            mapInstances[dayNum] = map;

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(map);

            function createNumberedIcon(num, color) {
                return L.divIcon({
                    className: 'custom-marker',
                    html: `<div style="background: ${color}; color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; border: 2px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.3);">${num}</div>`,
                    iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -16]
                });
            }

            const latlngs = [];
            eventsWithCoords.forEach((event, idx) => {
                const icon = createNumberedIcon(idx + 1, markerColor);
                const marker = L.marker(event.latlng, { icon }).addTo(map);
                marker.bindPopup(`
                    <div style="min-width: 160px;">
                        <strong style="font-size: 13px;">${idx + 1}. ${event.desc.replace(/<[^>]*>/g, '')}</strong><br>
                        <span style="color: #64748b; font-size: 12px;">${event.time}</span>
                        ${event.expense ? `<br><span style="color: #3b82f6; font-size: 12px; font-weight: 600;">$${event.expense}</span>` : ''}
                    </div>
                `);
                latlngs.push(event.latlng);
            });

            if (latlngs.length > 1) L.polyline(latlngs, { color: markerColor, weight: 3, opacity: 0.6, dashArray: '8, 8' }).addTo(map);
            if (latlngs.length > 0) map.fitBounds(L.latLngBounds(latlngs), { padding: [30, 30] });
            setTimeout(() => map.invalidateSize(), 400);
        }

        // Start
        window.onload = loadData;
    </script>
</body>
</html>
