<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trip Planner</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* Hide scrollbar for the filter navigation */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Cherry Blossom Effects */
        @keyframes fall {
            0% { transform: translate3d(0, -10vh, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translate3d(20vw, 110vh, 0) rotate(360deg); opacity: 0; }
        }
        .petal {
            position: absolute;
            background: linear-gradient(135deg, #ffc0cb 0%, #ffb6c1 100%);
            border-radius: 15px 0px 15px 0px;
            box-shadow: 0 0 4px rgba(255, 182, 193, 0.6);
            animation: fall linear infinite;
        }

        /* Leaflet map styling */
        .day-map { height: 300px; width: 100%; border-radius: 1rem; z-index: 1; }

        /* Expense input styling */
        .expense-input {
            width: 90px; padding: 2px 6px; border: 1px solid #e2e8f0; border-radius: 6px;
            font-size: 0.8rem; text-align: right; transition: border-color 0.2s; background: #f8fafc;
        }
        .expense-input:focus {
            outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15); background: #fff;
        }

        .budget-bar-fill { transition: width 0.5s ease; }
        .map-toggle-btn { cursor: pointer; transition: all 0.2s; }
        .map-toggle-btn:hover { transform: scale(1.05); }

        /* Smooth collapse */
        .map-container {
            max-height: 0; overflow: hidden; transition: max-height 0.4s ease, padding 0.4s ease;
        }
        .map-container.open { max-height: 400px; padding-top: 12px; padding-bottom: 12px; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-800 relative">

    <div id="ai-overlay" class="fixed inset-0 bg-slate-50 z-[100] flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-4xl font-extrabold text-slate-900 mb-2">AI Trip Planner</h1>
        <p class="text-slate-500 mb-8 max-w-md">Design a new journey with Gemini or load an existing itinerary from your Google Sheets database.</p>
        
        <div class="w-full max-w-xl bg-white p-8 rounded-3xl shadow-lg border border-slate-200">
            <div class="mb-6">
                <h3 class="text-left font-bold text-slate-700 mb-2">Create New Trip</h3>
                <textarea id="trip-prompt" class="w-full h-24 border border-slate-300 rounded-xl p-3 text-slate-700 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none resize-none mb-3" placeholder="E.g., A 5-day foodie trip to Penang focusing on street art and hawker centers..."></textarea>
                <button id="generate-btn" onclick="generateTrip()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-all flex items-center justify-center gap-2">
                    <i data-lucide="sparkles" class="w-5 h-5"></i> Generate with AI
                </button>
            </div>

            <div class="flex items-center gap-4 mb-6">
                <div class="h-px bg-slate-200 flex-1"></div>
                <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">OR</span>
                <div class="h-px bg-slate-200 flex-1"></div>
            </div>

            <div>
                <h3 class="text-left font-bold text-slate-700 mb-2">Load Saved Trip</h3>
                <div class="flex gap-2">
                    <select id="saved-trips-dropdown" class="flex-1 border border-slate-300 rounded-xl p-3 text-slate-700 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                        <option value="">Loading your trips...</option>
                    </select>
                    <button id="load-btn" onclick="loadPastTrip()" class="bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-6 rounded-xl shadow-md transition-all flex items-center justify-center gap-2 disabled:opacity-50" disabled>
                        <i data-lucide="download" class="w-5 h-5"></i> Load
                    </button>
                </div>
            </div>
        </div>

        <div id="loading-text" class="hidden flex-col items-center justify-center mt-6">
            <i data-lucide="loader-2" class="w-8 h-8 text-blue-500 animate-spin mb-2"></i>
            <p id="loading-message" class="text-slate-500 font-medium animate-pulse">Communicating with server...</p>
        </div>
    </div>

    <div id="blossom-container" class="fixed inset-0 pointer-events-none overflow-hidden z-50"></div>

    <header class="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm hidden" id="main-header">
        <div class="max-w-5xl mx-auto px-4 py-6">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 mb-2" id="header-title"></h1>
                    <div class="flex flex-wrap items-center gap-4 text-sm text-slate-500 font-medium" id="header-meta"></div>
                </div>
                <button onclick="window.location.reload()" class="text-xs font-bold text-slate-500 hover:text-slate-800 bg-slate-100 hover:bg-slate-200 px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1.5">
                    <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> Back to Menu
                </button>
            </div>
            <div class="flex overflow-x-auto gap-2 mt-6 pb-2 no-scrollbar" id="filter-nav"></div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 hidden" id="main-content"></main>

    <script>
        // --- CONFIGURATION ---
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbypxapeVVtaUud1MGHaJbNtFHMHc7XHt17aGb8RTL_ikH7PlP1NzQoCSfL3KZXTV8IC/exec"; // <--- PASTE YOUR URL HERE

        let tripData = null;
        let activeFilter = 'all';
        let openMaps = new Set();
        let mapInstances = {};

        const themeStyles = {
            pink: { btnActive: "bg-pink-500 text-white shadow-md", iconActive: "text-white", iconInactive: "text-pink-500", badge: "bg-pink-100 text-pink-700 border-pink-200", headerGrad: "from-pink-50", textMain: "text-pink-600", timelineIconNode: "border-pink-400 text-pink-500", mapMarker: "#ec4899" },
            orange: { btnActive: "bg-orange-500 text-white shadow-md", iconActive: "text-white", iconInactive: "text-orange-500", badge: "bg-orange-100 text-orange-700 border-orange-200", headerGrad: "from-orange-50", textMain: "text-orange-600", timelineIconNode: "border-orange-400 text-orange-500", mapMarker: "#f97316" },
            purple: { btnActive: "bg-purple-500 text-white shadow-md", iconActive: "text-white", iconInactive: "text-purple-500", badge: "bg-purple-100 text-purple-700 border-purple-200", headerGrad: "from-purple-50", textMain: "text-purple-600", timelineIconNode: "border-purple-400 text-purple-500", mapMarker: "#a855f7" }
        };

        // --- API CALLS ---
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            fetchTrips();
        });

        function showLoading(msg) {
            document.getElementById('loading-text').classList.remove('hidden');
            document.getElementById('loading-text').classList.add('flex');
            document.getElementById('loading-message').innerText = msg;
            document.getElementById('generate-btn').disabled = true;
            document.getElementById('load-btn').disabled = true;
        }

        function hideLoading() {
            document.getElementById('loading-text').classList.add('hidden');
            document.getElementById('loading-text').classList.remove('flex');
            document.getElementById('generate-btn').disabled = false;
            document.getElementById('load-btn').disabled = false;
        }

        async function fetchTrips() {
            if (GAS_WEB_APP_URL === "YOUR_WEB_APP_URL_HERE") {
                document.getElementById('saved-trips-dropdown').innerHTML = '<option value="">Awaiting GAS URL setup...</option>';
                return;
            }

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getTrips' })
                });
                const result = await response.json();
                
                const dropdown = document.getElementById('saved-trips-dropdown');
                if (result.success && result.trips.length > 0) {
                    dropdown.innerHTML = result.trips.map(t => `<option value="${t}">${t}</option>`).join('');
                    document.getElementById('load-btn').disabled = false;
                } else {
                    dropdown.innerHTML = '<option value="">No trips saved yet</option>';
                }
            } catch (err) {
                console.error("Failed to fetch trips", err);
                document.getElementById('saved-trips-dropdown').innerHTML = '<option value="">Error connecting to database</option>';
            }
        }

        async function loadPastTrip() {
            const selectedTrip = document.getElementById('saved-trips-dropdown').value;
            if (!selectedTrip) return;

            showLoading("Loading your itinerary from Google Sheets...");

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'loadTrip', title: selectedTrip })
                });
                const result = await response.json();
                
                if (result.success) {
                    tripData = result.data;
                    document.getElementById('ai-overlay').style.display = 'none';
                    document.getElementById('main-header').classList.remove('hidden');
                    document.getElementById('main-content').classList.remove('hidden');
                    initApp();
                } else {
                    alert("Error loading trip: " + result.error);
                }
            } catch (err) {
                alert("Network error. Make sure your GAS URL is correct.");
            } finally {
                hideLoading();
            }
        }

        async function generateTrip() {
            const prompt = document.getElementById('trip-prompt').value;
            if (!prompt) return alert("Please enter a trip description!");

            showLoading("Gemini is researching locations, mapping routes, and calculating budgets...");

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'generate', prompt: prompt })
                });
                const result = await response.json();
                
                if (result.success) {
                    tripData = result.data;
                    document.getElementById('ai-overlay').style.display = 'none';
                    document.getElementById('main-header').classList.remove('hidden');
                    document.getElementById('main-content').classList.remove('hidden');
                    initApp();
                } else {
                    alert("Error generating trip: " + result.error);
                }
            } catch (err) {
                alert("Network error. Make sure your GAS URL is correct.");
            } finally {
                hideLoading();
            }
        }

        function saveExpenses() {
            fetch(GAS_WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'update', title: tripData.overview.title, tripData: tripData })
            }).catch(e => console.error("Failed to sync expenses", e));
        }

        // --- MATH & UTILS ---
        function getTotalActivityExpenses() {
            let total = 0;
            tripData.itinerary.forEach(day => {
                day.events.forEach(e => total += (e.expense || 0));
            });
            return total;
        }

        function getDayExpenses(dayNum) {
            const day = tripData.itinerary.find(d => d.day === dayNum);
            return day ? day.events.reduce((sum, e) => sum + (e.expense || 0), 0) : 0;
        }

        function getLocationExpenses(locId) {
            return tripData.itinerary
                .filter(d => d.location === locId)
                .reduce((sum, day) => sum + day.events.reduce((s, e) => s + (e.expense || 0), 0), 0);
        }

        function getBaseBudgetTotal() {
            return tripData.budget.reduce((sum, b) => sum + b.amount, 0);
        }

        // --- INIT & RENDER ---
        function initApp() {
            document.getElementById('header-title').innerText = tripData.overview.title;
            renderHeaderMeta();
            createBlossoms(); // Note: if trip isn't spring/japan, might want to make this dynamic later!
            renderApp();
        }

        function renderHeaderMeta() {
            const grandTotal = getBaseBudgetTotal() + getTotalActivityExpenses();
            document.getElementById('header-meta').innerHTML = `
                <span class="flex items-center gap-1.5"><i data-lucide="calendar" class="w-4 h-4"></i> ${tripData.overview.dates}</span>
                <span class="flex items-center gap-1.5"><i data-lucide="credit-card" class="w-4 h-4"></i> Base: $${getBaseBudgetTotal().toLocaleString()} SGD</span>
                <span class="flex items-center gap-1.5"><i data-lucide="wallet" class="w-4 h-4"></i> Activities: $${getTotalActivityExpenses().toLocaleString()} SGD</span>
                <span class="flex items-center gap-1.5 font-bold text-slate-700"><i data-lucide="calculator" class="w-4 h-4"></i> Total: $${grandTotal.toLocaleString()} SGD</span>
            `;
            lucide.createIcons();
        }

        function setFilter(filterId) {
            activeFilter = filterId;
            Object.values(mapInstances).forEach(m => m.remove());
            mapInstances = {};
            openMaps.clear();
            renderApp();
        }

        function renderApp() {
            renderFilters();
            let mainHtml = '';
            if (activeFilter === 'all') {
                mainHtml += renderBudget();
            } else {
                mainHtml += renderHero();
            }
            mainHtml += renderExpenseSummary();
            mainHtml += renderTimeline();
            document.getElementById('main-content').innerHTML = mainHtml;
            lucide.createIcons();
        }

        function renderFilters() {
            const nav = document.getElementById('filter-nav');
            let html = `<button onclick="setFilter('all')" class="px-4 py-2 rounded-full text-sm font-bold transition-colors whitespace-nowrap ${activeFilter === 'all' ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}">Full Itinerary</button>`;
            
            tripData.locations.forEach(loc => {
                const isActive = activeFilter === loc.id;
                const theme = themeStyles[loc.color] || themeStyles.pink; // Fallback
                const btnClass = isActive ? theme.btnActive : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50';
                const iconClass = isActive ? theme.iconActive : theme.iconInactive;
                html += `<button onclick="setFilter('${loc.id}')" class="px-4 py-2 rounded-full text-sm font-bold transition-colors whitespace-nowrap flex items-center gap-2 ${btnClass}"><i data-lucide="map-pin" class="w-4 h-4 ${iconClass}"></i> ${loc.name}</button>`;
            });
            nav.innerHTML = html;
        }

        function renderBudget() {
            let html = `<section class="mb-8"><h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i data-lucide="credit-card" class="text-slate-400 w-6 h-6"></i> Base Estimates</h2><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">`;
            tripData.budget.forEach(item => {
                html += `
                    <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex items-start gap-4">
                        <div class="bg-slate-100 p-2.5 rounded-xl text-slate-600"><i data-lucide="${item.icon}" class="w-5 h-5"></i></div>
                        <div><p class="text-xs text-slate-500 font-medium mb-1">${item.item}</p><p class="font-bold text-slate-900">${item.cost}</p></div>
                    </div>`;
            });
            return html + `</div></section>`;
        }

        function renderExpenseSummary() {
            const grandTotal = getBaseBudgetTotal() + getTotalActivityExpenses();
            const filteredLocs = activeFilter === 'all' ? tripData.locations : tripData.locations.filter(l => l.id === activeFilter);
            let locBreakdown = '';
            filteredLocs.forEach(loc => {
                const theme = themeStyles[loc.color] || themeStyles.pink;
                locBreakdown += `<div class="flex items-center justify-between py-1.5"><span class="text-sm font-medium ${theme.textMain} flex items-center gap-1.5"><i data-lucide="map-pin" class="w-3.5 h-3.5"></i> ${loc.name}</span><span class="text-sm font-bold text-slate-700">$${getLocationExpenses(loc.id).toLocaleString()}</span></div>`;
            });
            const filteredActTotal = activeFilter === 'all' ? getTotalActivityExpenses() : getLocationExpenses(activeFilter);

            return `
                <section class="mb-8">
                    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="text-lg font-bold flex items-center gap-2"><i data-lucide="wallet" class="text-blue-500 w-5 h-5"></i> Expense Tracker</h3>
                            <div class="text-right">
                                <p class="text-xs text-slate-400">Estimated Activity Spend</p>
                                <p class="text-2xl font-extrabold text-slate-900">$${filteredActTotal.toLocaleString()} <span class="text-sm font-medium text-slate-400">SGD</span></p>
                            </div>
                        </div>
                        <div class="w-full bg-slate-100 rounded-full h-3 mb-4 overflow-hidden">
                            <div class="budget-bar-fill h-full rounded-full bg-gradient-to-r from-blue-400 to-blue-600" style="width: ${Math.min((getTotalActivityExpenses() / (grandTotal || 1)) * 100, 100)}%"></div>
                        </div>
                        <div class="border-t border-slate-100 pt-3">${locBreakdown}</div>
                        ${activeFilter === 'all' ? `<div class="border-t border-slate-200 mt-3 pt-3 flex items-center justify-between"><span class="text-sm font-bold text-slate-800">Grand Total (Base + Activities)</span><span class="text-lg font-extrabold text-slate-900">$${grandTotal.toLocaleString()} SGD</span></div>` : ''}
                    </div>
                </section>`;
        }

        function renderHero() {
            const loc = tripData.locations.find(l => l.id === activeFilter);
            if (!loc) return '';
            return `
                <div class="w-full h-64 md:h-80 rounded-3xl overflow-hidden mb-8 relative shadow-lg">
                    <img src="${loc.image}" alt="${loc.name}" class="w-full h-full object-cover" />
                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end p-8">
                        <h2 class="text-4xl font-extrabold text-white">${loc.name}</h2>
                    </div>
                </div>`;
        }

        function renderTimeline() {
            const days = tripData.itinerary.filter(d => activeFilter === 'all' || d.location === activeFilter);
            if (days.length === 0) return `<div class="text-center py-20"><p class="text-slate-500">No events found.</p></div>`;

            let html = '<div class="space-y-8">';
            days.forEach(day => {
                const loc = tripData.locations.find(l => l.id === day.location);
                const theme = themeStyles[loc.color] || themeStyles.pink;
                const hasMap = day.events.some(e => e.latlng);

                html += `
                    <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden hover:shadow-md transition-shadow">
                        <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-gradient-to-r ${theme.headerGrad} to-white">
                            <div>
                                <p class="text-sm font-bold ${theme.textMain} mb-1 flex items-center gap-2">DAY ${day.day} <span class="text-slate-300">•</span> ${day.date}</p>
                                <h3 class="text-xl font-extrabold text-slate-900">${day.title}</h3>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="text-sm font-bold text-slate-600 bg-slate-100 px-3 py-1 rounded-full flex items-center gap-1.5" data-day-expense="${day.day}"><i data-lucide="wallet" class="w-3.5 h-3.5"></i> $${getDayExpenses(day.day)}</span>
                                ${hasMap ? `<button onclick="toggleMap(${day.day})" class="map-toggle-btn px-3 py-1 rounded-full text-xs font-semibold border ${theme.badge} flex items-center gap-1.5"><i data-lucide="map" class="w-3.5 h-3.5"></i> Map</button>` : ''}
                                <span class="px-3 py-1 rounded-full text-xs font-semibold border ${theme.badge}">${loc.name}</span>
                            </div>
                        </div>
                        ${hasMap ? `<div id="map-container-${day.day}" class="map-container px-6"><div id="map-${day.day}" class="day-map"></div></div>` : ''}
                        <div class="p-6"><div class="relative border-l-2 border-slate-100 ml-3 space-y-8">`;

                day.events.forEach((event, idx) => {
                    html += `
                        <div class="relative pl-8">
                            <div class="absolute -left-[17px] top-1 bg-white border-2 w-8 h-8 rounded-full flex items-center justify-center shadow-sm ${theme.timelineIconNode}"><i data-lucide="${event.icon}" class="w-3.5 h-3.5"></i></div>
                            <div class="flex flex-col sm:flex-row sm:items-start gap-2 sm:gap-4">
                                <span class="text-sm font-bold text-slate-400 min-w-[80px] flex items-center gap-1.5 mt-1"><i data-lucide="clock" class="w-3.5 h-3.5"></i> ${event.time}</span>
                                <div class="flex flex-col flex-1">
                                    <div class="flex items-start justify-between gap-2">
                                        <div class="flex flex-col">
                                            ${event.link ? `<a href="${event.link}" target="_blank" class="text-slate-800 font-medium text-lg leading-tight hover:text-blue-600 transition-colors block">${event.desc}</a>` : `<span class="text-slate-800 font-medium text-lg leading-tight block">${event.desc}</span>`}
                                        </div>
                                        <div class="flex items-center gap-1 shrink-0 mt-0.5">
                                            <span class="text-xs text-slate-400">$</span>
                                            <input type="number" min="0" step="1" class="expense-input" value="${event.expense || 0}" onchange="updateExpense(${day.day}, ${idx}, this.value)" onfocus="this.select()" placeholder="0"/>
                                        </div>
                                    </div>
                                    ${event.subLinks ? `<div class="flex flex-col gap-1.5 mt-2">${event.subLinks.map(sub => `<a href="${sub.link}" target="_blank" class="text-sm font-medium text-slate-500 hover:text-blue-600 hover:underline flex items-center gap-1.5"><i data-lucide="corner-down-right" class="w-3.5 h-3.5 text-slate-400"></i> ${sub.name}</a>`).join('')}</div>` : ''}
                                </div>
                            </div>
                        </div>`;
                });
                html += `</div></div></div>`;
            });
            return html + '</div>';
        }

        // --- EXPENSES & STATE ---
        function updateExpense(dayNum, eventIdx, value) {
            const day = tripData.itinerary.find(d => d.day === dayNum);
            if (day && day.events[eventIdx]) {
                day.events[eventIdx].expense = Math.max(0, parseInt(value) || 0);
                saveExpenses();
                renderHeaderMeta();
                updateExpenseDisplays();
            }
        }

        function updateExpenseDisplays() {
            tripData.itinerary.forEach(day => {
                const badge = document.querySelector(`[data-day-expense="${day.day}"]`);
                if (badge) badge.innerHTML = `<i data-lucide="wallet" class="w-3.5 h-3.5"></i> $${getDayExpenses(day.day)}`;
            });
            const wasOpen = new Set(openMaps);
            renderApp();
            wasOpen.forEach(d => setTimeout(() => toggleMap(d), 100));
        }

        // --- MAPS ---
        function toggleMap(dayNum) {
            const container = document.getElementById(`map-container-${dayNum}`);
            if (!container) return;
            if (openMaps.has(dayNum)) {
                container.classList.remove('open');
                openMaps.delete(dayNum);
                if (mapInstances[dayNum]) { mapInstances[dayNum].remove(); delete mapInstances[dayNum]; }
            } else {
                container.classList.add('open');
                openMaps.add(dayNum);
                setTimeout(() => initMap(dayNum), 50);
            }
        }

        function initMap(dayNum) {
            const mapEl = document.getElementById(`map-${dayNum}`);
            if (!mapEl || mapInstances[dayNum]) return;
            const day = tripData.itinerary.find(d => d.day === dayNum);
            const events = day.events.filter(e => e.latlng);
            if (!events.length) return;

            const loc = tripData.locations.find(l => l.id === day.location);
            const color = (themeStyles[loc.color] || themeStyles.pink).mapMarker;

            const map = L.map(mapEl, { scrollWheelZoom: false });
            mapInstances[dayNum] = map;
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            const latlngs = [];
            events.forEach((e, i) => {
                const icon = L.divIcon({
                    className: 'custom-marker',
                    html: `<div style="background:${color};color:white;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);">${i + 1}</div>`,
                    iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -16]
                });
                L.marker(e.latlng, { icon }).addTo(map).bindPopup(`<div style="min-width:160px;"><strong>${i+1}. ${e.desc.replace(/<[^>]*>/g, '')}</strong><br><span style="color:#64748b;font-size:12px;">${e.time}</span></div>`);
                latlngs.push(e.latlng);
            });

            if (latlngs.length > 1) L.polyline(latlngs, { color: color, weight: 3, dashArray: '8, 8' }).addTo(map);
            if (latlngs.length) map.fitBounds(L.latLngBounds(latlngs), { padding: [30, 30] });
            setTimeout(() => map.invalidateSize(), 400);
        }

        // --- EFFECTS ---
        function createBlossoms() {
            const container = document.getElementById('blossom-container');
            container.innerHTML = '';
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'petal';
                const s = Math.random() * 8 + 6;
                p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*120-10}vw;animation-duration:${Math.random()*8+6}s;animation-delay:-${Math.random()*10}s;`;
                container.appendChild(p);
            }
        }
    </script>
</body>
</html>
